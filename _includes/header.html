<header class="site-header">
  <div class="header-inner">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      <span class="logo-bracket">[</span>AFTERTHOUGHTS<span class="logo-bracket">]</span>
    </a>
    <nav class="site-nav" id="site-nav">
      <a href="{{ '/journal' | relative_url }}" class="nav-link{% if page.url contains '/journal' or page.layout == 'post' %} active{% endif %}">Journal</a>
      <a href="{{ '/projects' | relative_url }}" class="nav-link{% if page.url contains '/projects' or page.layout == 'project' %} active{% endif %}">Projects</a>
      <a href="{{ '/photography' | relative_url }}" class="nav-link{% if page.url contains '/photography' %} active{% endif %}">Photos</a>
      <a href="{{ '/experiences' | relative_url }}" class="nav-link{% if page.url contains '/experiences' or page.layout == 'experience' %} active{% endif %}">Experiences</a>
      <a href="{{ '/about' | relative_url }}" class="nav-link{% if page.url == '/about/' or page.url == '/about.html' %} active{% endif %}">About</a>
    </nav>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">&#x2261;</button>
  </div>
</header>
